name: gate

# Required status check: migration ordering, run on every PR and every
# merge-queue entry. In the merge_group the check sees the PR's migrations
# measured against the UPDATED main (E2), so an order collision that only
# manifests after a sibling PR merges is caught here and ejects the PR.

on:
  pull_request:
  merge_group:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: ./scripts/check-order.sh
