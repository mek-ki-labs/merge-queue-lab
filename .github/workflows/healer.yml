name: healer

# Self-heals an out-of-order migration after the merge queue ejects the PR.
# Guard 1 (E1): only act when merged == false — dequeued fires on merge too.
# Guard 2: heal.sh only rewrites if there is actually an ordering violation,
#          and refuses anything but a pure migration rename (trust guard).
# Pushes under the App token (the default GITHUB_TOKEN cannot re-trigger the
# gate), then re-queues via gh pr merge --auto.

on:
  pull_request:
    types: [dequeued]

jobs:
  heal:
    if: ${{ !github.event.pull_request.merged }}
    runs-on: ubuntu-latest
    steps:
      - name: mint App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HEALER_APP_ID }}
          private-key: ${{ secrets.HEALER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: heal ordering
        id: heal
        run: ./scripts/heal.sh

      - name: push + re-queue
        if: ${{ steps.heal.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          gh pr merge ${{ github.event.number }} --repo "${{ github.repository }}" --auto
          echo "healed and re-queued PR #${{ github.event.number }}"
