name: tests

# A second required check (stands in for chi's lint/typecheck/worker:test). It
# fails when a PR contains the marker file `tests-should-fail`, letting the lab
# simulate a non-ordering ejection so we can prove the healer refuses to
# auto-re-queue PRs that were ejected for reasons other than migration ordering.

on:
  pull_request:
  merge_group:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fail if marker present
        run: |
          if [ -f tests-should-fail ]; then echo "marker present — failing"; exit 1; fi
          echo "no marker — passing"
