name: tests

# A second required check (stands in for chi's lint/typecheck/worker:test). To
# simulate a NON-ordering merge-queue ejection deterministically it passes on the
# PR itself (so the PR can enter the queue) but fails inside the merge group when
# the marker file `tests-should-fail` is present — mimicking a check that only
# breaks once the PR is combined with main. This lets the lab prove the healer
# refuses to auto-re-queue PRs ejected for reasons other than migration ordering.

on:
  pull_request:
  merge_group:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fail in merge_group if marker present
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ] && [ -f tests-should-fail ]; then
            echo "marker present in merge group — failing"; exit 1
          fi
          echo "passing (event=${{ github.event_name }})"
